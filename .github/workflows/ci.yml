name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
        with:
          python-version: ${{ matrix.python-version }}
          enable-cache: true
      - run: sudo apt-get update && sudo apt-get install -y ffmpeg libgl1
      - run: uv sync --extra dev
      - run: uv run ruff check rotate_to_beat_cli.py circle_image.py src tests
      - run: uv run pytest -q
      - run: uv build
